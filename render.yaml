services:
  - type: web
    name: filing-translation-engine
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SEC_USER_AGENT
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.openai.com
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: DB_PATH
        value: /var/data/app.db
    disk:
      name: filing-engine-disk
      mountPath: /var/data
      sizeGB: 1
